services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: root
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.23.0
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up --database.address root:localdb@postgres:5432/nakama &&
        exec /nakama/nakama --name nakama1
        --database.address root:localdb@postgres:5432/nakama
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
        --config /nakama/data/local.yml
    restart: unless-stopped
    links:
      - postgres
    volumes:
      - ./nakama/modules:/nakama/data/modules
      - ./nakama/local.yml:/nakama/data/local.yml
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
